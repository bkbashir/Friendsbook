<!-- ========================= -->
<!-- Header -->
<!-- ========================= -->

<header class="fbHeader">

    <div class="headerLeft">

        <button id="menuBtn" class="iconBtn">
            <i class="fa-solid fa-bars"></i>
        </button>

        <img src="logo.png" class="logo">

        <span class="appName">Friendsbook</span>

    </div>

    <div class="headerRight">

        <button id="createBtn" class="iconBtn">
            <i class="fa-solid fa-plus"></i>
        </button>

        <button id="searchBtn" class="iconBtn">
            <i class="fa-solid fa-magnifying-glass"></i>
        </button>

        <button id="messageBtn" class="iconBtn">
            <i class="fa-brands fa-facebook-messenger"></i>
        </button>

    </div>

</header>

<!-- ========================= -->
<!-- Main Container -->
<!-- ========================= -->

<main id="mainContainer">

</main>

<!-- ========================= -->
<!-- Bottom Navigation -->
<!-- ========================= -->

<nav class="bottomNav">

    <button id="homeBtn" class="navItem active">
        <i class="fa-solid fa-house"></i>
        <span>Home</span>
    </button>

    <button id="reelsBtn" class="navItem">
        <i class="fa-solid fa-circle-play"></i>
        <span>Reels</span>
    </button>

    <button id="marketBtn" class="navItem">
        <i class="fa-solid fa-shop"></i>
        <span>Market</span>
    </button>

    <button id="notifyBtn" class="navItem">
        <i class="fa-solid fa-bell"></i>
        <span>Notify</span>
    </button>

    <button id="profileBtn" class="navItem">
        <i class="fa-solid fa-user"></i>
        <span>Profile</span>
    </button>

</nav>
<!-- ========================= -->
<!-- Menu Drawer -->
<!-- ========================= -->

<div id="menuOverlay"></div>

<div id="menuDrawer">

<div class="drawerHeader">

<img src="logo.png" class="drawerLogo">

<h2>Friendsbook</h2>

</div>

<div class="drawerMenu">

<button id="profileMenuBtn">
<i class="fa-solid fa-user"></i>
<span>Profile</span>
</button>

<button id="friendsMenuBtn">
<i class="fa-solid fa-user-group"></i>
<span>Friends</span>
</button>

<button id="savedMenuBtn">
<i class="fa-solid fa-bookmark"></i>
<span>Saved</span>
</button>

<button id="reelsMenuBtn">
<i class="fa-solid fa-circle-play"></i>
<span>Reels</span>
</button>

<button id="marketMenuBtn">
<i class="fa-solid fa-shop"></i>
<span>Marketplace</span>
</button>

<button id="settingMenuBtn">
<i class="fa-solid fa-gear"></i>
<span>Settings</span>
</button>

<button id="logoutMenuBtn">
<i class="fa-solid fa-right-from-bracket"></i>
<span>Logout</span>
</button>

</div>

</div>
