<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Friendsbook</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>

<!-- Loading -->
<div id="loadingScreen">
<img src="myphoto.png" id="loadingLogo">
<h2>Friendsbook 2026</h2>
</div>

<!-- Login -->
<section id="loginPage">

<h2>Friendsbook</h2>

<form id="loginForm">

<input id="loginEmail" type="email" placeholder="Email">

<input id="loginPassword" type="password" placeholder="Password">

<button type="submit">Login</button>

</form>

<button id="openSignupBtn">Create Account</button>

</section>

<!-- Signup -->
<section id="signupPage" style="display:none">

<form id="signupForm">

<input id="fullName" placeholder="Full Name">

<input id="signupEmail" type="email" placeholder="Email">

<input id="signupPassword" type="password" placeholder="Password">

<button>Create</button>

</form>

<button id="backLoginBtn">Back</button>

</section>

<!-- Main -->
<section id="mainPage" style="display:none">

<header>

<button id="menuBtn">
☰
</button>

<h2>Friendsbook</h2>

</header>

<aside id="drawer">

<img id="drawerProfilePhoto">

<h3 id="drawerProfileName"></h3>

<button id="logoutBtn">Logout</button>

</aside>

<section id="homePage">

<h2>Home</h2>

</section>

<section id="profilePage" style="display:none">

<img id="coverPhoto">

<img id="profilePhoto">

<h2 id="profileName"></h2>

<p id="profileBio"></p>

<button id="editProfileBtn">

Edit Profile

</button>

</section>

<nav>

<button id="navHome">Home</button>

<button id="navProfile">Profile</button>

</nav>

</section>

<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-storage-compat.js"></script>

<script src="script.js"></script>

</body>
    </html>
