<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Friendsbook 2026</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<!-- Loading -->
<div id="loader">

<div class="loaderLogo">

Friendsbook

</div>

</div>

<!-- Main App -->
<div id="app" style="display:none;">

<!-- Header -->

<header class="header">

<div class="headerLeft">

<button id="menuBtn">

<i class="fa-solid fa-bars"></i>

</button>

<h2 class="logo">

Friendsbook

</h2>

</div>

<div class="headerRight">

<button id="createBtn">

<i class="fa-solid fa-plus"></i>

</button>

<button id="searchBtn">

<i class="fa-solid fa-magnifying-glass"></i>

</button>

<button id="messageBtn">

<i class="fa-brands fa-facebook-messenger"></i>

</button>

</div>

</header>

<!-- Home Page -->

<main id="homePage">

</main>

<!-- Drawer -->

<aside id="drawer">

</aside>

<!-- Bottom Navigation -->

<nav class="bottomNav">

<button id="homeBtn">

<i class="fa-solid fa-house"></i>

<span>Home</span>

</button>

<button id="reelsBtn">

<i class="fa-solid fa-circle-play"></i>

<span>Reels</span>

</button>

<button id="marketBtn">

<i class="fa-solid fa-shop"></i>

<span>Market</span>

</button>

<button id="notifyBtn">

<i class="fa-solid fa-bell"></i>

<span>Notify</span>

</button>

<button id="profileBtn">

<i class="fa-solid fa-user"></i>

<span>Profile</span>

</button>

</nav>

</div>

<script src="script.js"></script>

</body>

</html>
